name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Test Job ───
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pytest-asyncio pytest-xdist
          pip install -e .

      - name: Run tests with coverage
        run: |
          python -m pytest \
            tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=json \
            --asyncio-mode=auto \
            -v \
            --tb=short \
            --maxfail=5

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella

      - name: Check coverage threshold
        run: |
          COVERAGE=$(python -c "import json; print(int(json.load(open('coverage.json'))['totals']['percent_covered']))")
          if [ $COVERAGE -lt 75 ]; then
            echo "Coverage $COVERAGE% ist unter 75% Threshold"
            exit 1
          fi
          echo "✓ Coverage $COVERAGE% meets threshold"

      - name: Archive coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: |
            htmlcov/
            coverage.json
            coverage.xml

  # ─── Lint Job ───
  lint:
    name: Lint & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          pip install pylint bandit safety
          pip install -e .

      - name: Run Pylint
        continue-on-error: true
        run: |
          pylint app/ --fail-under=8.0 || true

      - name: Run Bandit Security Linter
        run: |
          bandit -r app/ -f json -o bandit-report.json || true

      - name: Check for security vulnerabilities
        run: |
          safety check --json > safety-report.json || true

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json

  # ─── Build Job ───
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}

  # ─── Security Scan Job ───
  security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ─── Integration Test Job ───
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d postgres redis backend

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U docstore; do sleep 2; done'
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'

      - name: Run integration tests
        run: |
          docker compose exec -T backend python -m pytest tests/test_api_integration.py -v

      - name: Collect logs
        if: failure()
        run: |
          docker compose logs > integration-test-logs.txt

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: integration-test-logs
          path: integration-test-logs.txt

      - name: Stop services
        if: always()
        run: |
          docker compose down -v

  # ─── Performance Test Job ───
  performance-test:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [build]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start services
        run: |
          docker compose up -d postgres redis backend

      - name: Wait for services
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:8000/health; do sleep 2; done'

      - name: Run performance tests
        run: |
          docker compose exec -T backend python -m pytest tests/test_performance.py -v

      - name: Stop services
        if: always()
        run: |
          docker compose down -v

  # ─── Deploy Job ───
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [integration-test, performance-test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://docstore.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        run: |
          echo "Deploying to production server..."
          # Hier den eigentlichen Deploy-Command einfügen
          # z.B. ssh user@server "cd /opt/docstore-prod && docker compose pull && docker compose up -d"

      - name: Health check
        run: |
          sleep 10
          curl -f https://docstore.example.com/health || exit 1

      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Deployment erfolgreich!"
          # Hier Notifications einfügen (Slack, Email, etc.)

  # ─── Release Job ───
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --oneline --pretty=format:"%s" > CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: CHANGELOG.md
          files: |
            README.md
            IMPLEMENTATION_SUMMARY.md
            NEW_FEATURES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
