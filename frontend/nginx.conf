# ═══════════════════════════════════════════════════════════════
# nginx.conf — Agentischer Document Store Frontend
# Serves static React-Build + Reverse-Proxy zu Backend
# ═══════════════════════════════════════════════════════════════

# Upstream Backend (via Docker-Network)
upstream docstore_backend {
    server backend:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'" always;

    # Body-Limit fuer Datei-Uploads (Dokumente bis 100 MB)
    client_max_body_size 100M;
    client_body_timeout 120s;
    client_header_timeout 60s;

    # Gzip-Kompression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss;
    gzip_min_length 256;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Static Assets mit Cache-Headers ───
    location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ─── API-Reverse-Proxy ───
    location /api/ {
        proxy_pass http://docstore_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts fuer lange Skills/LLM-Calls
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;

        # SSE-Support fuer Streaming-Endpunkte (Skills, Ingestion)
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }

    # ─── Health-Check Proxy ───
    location /health {
        proxy_pass http://docstore_backend/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ─── Frontend SPA (alle anderen Routen) ───
    location / {
        try_files $uri $uri/ /index.html;
        # index.html nicht cachen, damit Updates sofort greifen
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ─── Error-Pages ───
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
