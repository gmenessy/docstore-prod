# ═══════════════════════════════════════════════════════════════
# Monitoring-Stack — Prometheus + Grafana + Node-Exporter
#
# Aktivierung:
#   docker compose -f docker-compose.yml -f deploy/monitoring/docker-compose.monitoring.yml up -d
#
# Zugang:
#   Prometheus:  http://localhost:9090 (intern)
#   Grafana:     http://localhost:3000 (Login: admin / <GRAFANA_ADMIN_PASSWORD>)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Prometheus — Metriken-Sammler ──
  prometheus:
    image: prom/prometheus:latest
    container_name: docstore-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - docstore-net
    security_opt:
      - no-new-privileges:true

  # ── Grafana — Dashboards ──
  grafana:
    image: grafana/grafana:latest
    container_name: docstore-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/monitoring/grafana-provisioning:/etc/grafana/provisioning:ro
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    networks:
      - docstore-net
    security_opt:
      - no-new-privileges:true

  # ── Node-Exporter — Host-Metriken ──
  node-exporter:
    image: prom/node-exporter:latest
    container_name: docstore-node-exporter
    restart: unless-stopped
    command:
      - "--path.procfs=/host/proc"
      - "--path.rootfs=/rootfs"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - docstore-net
    security_opt:
      - no-new-privileges:true

  # ── Postgres-Exporter ──
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: docstore-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://docstore:${POSTGRES_PASSWORD}@postgres:5432/docstore?sslmode=disable"
    depends_on:
      - postgres
    networks:
      - docstore-net
    security_opt:
      - no-new-privileges:true

  # ── Redis-Exporter ──
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: docstore-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis
    networks:
      - docstore-net
    security_opt:
      - no-new-privileges:true

volumes:
  prometheus_data:
  grafana_data:
