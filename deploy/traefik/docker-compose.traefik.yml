# ═══════════════════════════════════════════════════════════════
# Traefik-Erweiterung — HTTPS mit Let's Encrypt oder Custom-Certs
#
# Aktivierung:
#   # .env ergaenzen:
#   DOCSTORE_DOMAIN=docstore.example.com
#   TRAEFIK_ACME_EMAIL=admin@example.com
#
#   docker compose -f docker-compose.yml -f deploy/traefik/docker-compose.traefik.yml up -d
#
# Mit eigenen Zertifikaten (statt Let's Encrypt):
#   # Zertifikate in deploy/traefik/certs/ ablegen:
#   #   fullchain.pem, privkey.pem
#   # In .env: TRAEFIK_USE_CUSTOM_CERTS=true
# ═══════════════════════════════════════════════════════════════

services:
  traefik:
    image: traefik:v3.2
    container_name: docstore-traefik
    restart: unless-stopped
    command:
      # Dashboard (nur intern)
      - "--api.dashboard=true"
      - "--api.insecure=false"
      # Docker-Provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=docstore-net"
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS Redirect
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      # Let's Encrypt
      - "--certificatesresolvers.letsencrypt.acme.email=${TRAEFIK_ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      # Logging
      - "--log.level=${TRAEFIK_LOG_LEVEL:-INFO}"
      - "--accesslog=true"
      - "--accesslog.filepath=/logs/access.log"
      # Metrics (optional, fuer Prometheus)
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.addEntryPointsLabels=true"
      - "--metrics.prometheus.addRoutersLabels=true"
      - "--metrics.prometheus.addServicesLabels=true"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
      - traefik_logs:/logs
      - ./deploy/traefik/certs:/certs:ro  # Fuer Custom-Certs
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    labels:
      # Dashboard via Basic-Auth (nur intern erreichbar via Port-Binding)
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOCSTORE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      # Basic-Auth: htpasswd-Hash in .env setzen (openssl passwd -apr1)
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH:-admin:\\$$apr1\\$$H6uskkkW\\$$IgXLP6ewTrSuBkTrqE8wj/}"
    networks:
      - docstore-net
    security_opt:
      - no-new-privileges:true

  # ── Frontend mit Traefik-Labels ──
  frontend:
    ports: []  # Port 80 nicht mehr direkt, nur ueber Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOCSTORE_DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
      # Security-Headers Middleware
      - "traefik.http.routers.frontend.middlewares=security-headers@file,rate-limit@file"

volumes:
  traefik_letsencrypt:
  traefik_logs:
